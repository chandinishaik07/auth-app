<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AuthApp</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9f7f4;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid #e8e4de;
      background: #fff;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: #1a1a2e;
      text-decoration: none;
    }

    .nav-hint { font-size: 0.9rem; color: #5f5f7a; }
    .nav-hint a { color: #4f46e5; text-decoration: none; font-weight: 500; }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e4de;
      border-radius: 18px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .card-sub {
      font-size: 0.9rem;
      color: #5f5f7a;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #1a1a2e;
    }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e8e4de;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #4f46e5; background: #fff; }

    .btn-submit {
      width: 100%;
      padding: 0.8rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #4338ca; }
    .btn-submit:disabled { background: #a5b4fc; cursor: not-allowed; }

    .msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 9px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
    .msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }

    .divider {
      text-align: center;
      margin: 1.5rem 0 0;
      font-size: 0.875rem;
      color: #5f5f7a;
    }

    .divider a { color: #4f46e5; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">AuthApp</a>
    <span class="nav-hint">Already have an account? <a href="login.html">Log in</a></span>
  </nav>

  <div class="page">
    <div class="card">
      <h1 class="card-title">Create account</h1>
      <p class="card-sub">Sign up to get started with AuthApp</p>

      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Raj Kumar" />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="raj@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" />
      </div>

      <button class="btn-submit" id="registerBtn" onclick="register()">Create account</button>

      <div class="msg" id="msg"></div>

      <p class="divider">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('registerBtn');
      const msg = document.getElementById('msg');

      if (!name || !email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';
      msg.className = 'msg';

      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          msg.className = 'msg success';
          msg.textContent = 'Account created! Redirecting...';
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          msg.className = 'msg error';
          msg.textContent = data.msg || 'Something went wrong.';
          btn.disabled = false;
          btn.textContent = 'Create account';
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Could not connect to server.';
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }
  </script>

</body>
</html>
