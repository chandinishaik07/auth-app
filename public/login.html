<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login — AuthApp</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card { background:white; padding:30px; border-radius:10px; width:300px; }
    input, button { width:100%; padding:10px; margin:8px 0; }
    button { background:#4f46e5; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<div class="card">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('http://localhost:5000/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('token', data.token);
      document.getElementById('msg').innerText = "Login successful!";
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } else {
      document.getElementById('msg').innerText = data.msg;
    }

  } catch (err) {
    document.getElementById('msg').innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
