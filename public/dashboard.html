<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — AuthApp</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9f7f4;
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 1.4rem 2.5rem;
      background: white;
      border-bottom: 1px solid #e8e4de;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 80px);
    }

    .card {
      background: white;
      padding: 2.5rem;
      border-radius: 18px;
      border: 1px solid #e8e4de;
      width: 400px;
      text-align: center;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #5f5f7a;
      margin-bottom: 20px;
    }

    .message {
      font-size: 1rem;
      margin-top: 1rem;
      color: #1a1a2e;
    }

    .badge {
      display: inline-block;
      background: #ede9fe;
      color: #4f46e5;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-bottom: 15px;
    }

  </style>
</head>
<body>

<nav>
  <div class="logo">AuthApp</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="container">
  <div class="card">
    <div class="badge">Authenticated</div>
    <h1 class="title">Welcome 🎉</h1>
    <p class="subtitle">You have successfully logged in</p>

    <p class="message" id="message">Loading...</p>
  </div>
</div>

<script>
async function loadDashboard() {
  const token = localStorage.getItem('token');

  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const res = await fetch('http://localhost:5000/api/dashboard', {
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById('message').innerText = data.msg;
    } else {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

  } catch (err) {
    document.getElementById('message').innerText = "Error loading dashboard";
  }
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

loadDashboard();
</script>

</body>
</html>
